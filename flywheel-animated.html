<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flywheel Animated</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #060b18;
  }

  /* Outer container — stays fixed, clips the rotating content */
  .flywheel-clip {
    position: relative;
    width: 560px;
    height: 560px;
    border-radius: 50%;
    overflow: hidden;
  }

  /* Everything inside rotates as one unit */
  .flywheel-rotating {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    animation: spinCW 30s linear infinite;
    transform-origin: 50% 50%;
  }

  @keyframes spinCW {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .flywheel-rotating img {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 50%;
  }

  /* SVG overlay sits on top of the image, same size */
  .overlay-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="flywheel-clip">
  <div class="flywheel-rotating">
    <img src="assets/flywheel.png" alt="Sales Flywheel">

    <svg class="overlay-svg"
         viewBox="0 0 630 630"
         xmlns="http://www.w3.org/2000/svg">

      <defs>
        <!-- ===== GLOW FILTERS ===== -->
        <filter id="goldGlowSoft" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur1"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur2"/>
          <feMerge>
            <feMergeNode in="blur2"/>
            <feMergeNode in="blur1"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <filter id="goldGlowHard" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="8"  result="b2"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b3"/>
          <feMerge>
            <feMergeNode in="b3"/>
            <feMergeNode in="b2"/>
            <feMergeNode in="b1"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- ===== ROTATING SHIMMER CONIC GRADIENT (via mask trick) ===== -->
        <!-- Rotating sweep highlight for bubbles -->
        <linearGradient id="sweepGrad" gradientUnits="userSpaceOnUse"
                        x1="0" y1="0" x2="630" y2="630">
          <stop offset="0%"   stop-color="#7a5500"/>
          <stop offset="30%"  stop-color="#ffd700"/>
          <stop offset="55%"  stop-color="#fff8dc"/>
          <stop offset="70%"  stop-color="#ffd700"/>
          <stop offset="100%" stop-color="#7a5500"/>
        </linearGradient>

        <!-- Animated rotating gradient for shimmer sweep -->
        <linearGradient id="rotGold" gradientUnits="userSpaceOnUse"
                        x1="0" y1="315" x2="630" y2="315">
          <stop offset="0%"   stop-color="#b8860b"/>
          <stop offset="35%"  stop-color="#ffd700"/>
          <stop offset="65%"  stop-color="#fffacd"/>
          <stop offset="100%" stop-color="#b8860b"/>
          <animateTransform attributeName="gradientTransform"
            type="rotate" from="0 315 315" to="360 315 315"
            dur="4s" repeatCount="indefinite"/>
        </linearGradient>
      </defs>

      <!-- ============================================================
           LIGHTBULB BUBBLE — Glass circle on the left
           Image coords: center ≈ (202, 313), radius ≈ 115
      ============================================================ -->

      <!-- Outer glow ring -->
      <circle cx="202" cy="313" r="120"
              fill="none"
              stroke="url(#rotGold)"
              stroke-width="3.5"
              filter="url(#goldGlowSoft)">
        <animate attributeName="opacity"
          values="0.55;1;0.75;1;0.55" keyTimes="0;0.25;0.5;0.75;1"
          dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="stroke-width"
          values="2.5;5;3;5;2.5" keyTimes="0;0.25;0.5;0.75;1"
          dur="3.5s" repeatCount="indefinite"/>
      </circle>

      <!-- Second tighter ring — shimmer layer -->
      <circle cx="202" cy="313" r="113"
              fill="rgba(255,200,0,0.05)"
              stroke="#ffe566"
              stroke-width="1.5">
        <animate attributeName="opacity"
          values="0.3;0.8;0.3" dur="4.2s" repeatCount="indefinite" begin="0.5s"/>
      </circle>

      <!-- Rotating bright highlight arc (the "glass sheen") -->
      <circle cx="202" cy="313" r="116"
              fill="none"
              stroke="white"
              stroke-width="2.5"
              stroke-dasharray="45 685"
              stroke-linecap="round"
              opacity="0.75">
        <animateTransform attributeName="transform"
          type="rotate" from="0 202 313" to="360 202 313"
          dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="5s" repeatCount="indefinite"/>
      </circle>

      <!-- Second highlight arc, offset phase -->
      <circle cx="202" cy="313" r="116"
              fill="none"
              stroke="#ffd700"
              stroke-width="1.5"
              stroke-dasharray="20 685"
              stroke-linecap="round"
              opacity="0.6">
        <animateTransform attributeName="transform"
          type="rotate" from="180 202 313" to="540 202 313"
          dur="5s" repeatCount="indefinite"/>
      </circle>

      <!-- ============================================================
           STORY BOOK OUTER BORDER
           The book is a crystal/gem shape at top-right
           Center ≈ (462, 115), roughly 160w × 170h
      ============================================================ -->

      <!-- Outer border polygon approximating the book crystal shape -->
      <polygon
        points="365,48  500,25  568,90  545,192  415,210  348,138"
        fill="rgba(255,200,0,0.04)"
        stroke="url(#rotGold)"
        stroke-width="3"
        stroke-linejoin="round"
        filter="url(#goldGlowSoft)">
        <animate attributeName="opacity"
          values="0.5;1;0.6;1;0.5" keyTimes="0;0.25;0.5;0.75;1"
          dur="4s" repeatCount="indefinite" begin="0.8s"/>
        <animate attributeName="stroke-width"
          values="2;4.5;2.5;4.5;2" keyTimes="0;0.25;0.5;0.75;1"
          dur="4s" repeatCount="indefinite" begin="0.8s"/>
      </polygon>

      <!-- Inner shimmer polygon -->
      <polygon
        points="370,55  495,35  560,95  538,185  420,200  357,132"
        fill="none"
        stroke="#ffe566"
        stroke-width="1"
        opacity="0.5">
        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.8s" repeatCount="indefinite"/>
      </polygon>

      <!-- Rotating glass-sheen highlight on book -->
      <polygon
        points="365,48  500,25  568,90  545,192  415,210  348,138"
        fill="none"
        stroke="white"
        stroke-width="2"
        stroke-dasharray="35 700"
        stroke-linecap="round"
        opacity="0.6">
        <animateTransform attributeName="transform"
          type="rotate" from="0 458 118" to="360 458 118"
          dur="6s" repeatCount="indefinite"/>
      </polygon>

      <!-- ============================================================
           ARROW 1 — Upper diagonal (right of lightbulb → story book)
           Sweeps from ~(315,215) up-right to ~(380,80)
      ============================================================ -->

      <!-- Glow halo layer -->
      <path d="M 316,218  Q 345,148  385,83"
            fill="none"
            stroke="#ffaa00"
            stroke-width="10"
            stroke-linecap="round"
            opacity="0.25"
            filter="url(#goldGlowHard)">
        <animate attributeName="opacity" values="0.15;0.45;0.15" dur="2.8s" repeatCount="indefinite"/>
      </path>
      <!-- Main arrow shaft -->
      <path d="M 316,218  Q 345,148  385,83"
            fill="none"
            stroke="url(#rotGold)"
            stroke-width="5"
            stroke-linecap="round"
            filter="url(#goldGlowSoft)">
        <animate attributeName="opacity" values="0.65;1;0.65" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="stroke-width" values="4;6.5;4" dur="2.8s" repeatCount="indefinite"/>
      </path>
      <!-- Arrowhead 1 -->
      <polygon points="383,66  402,91  375,96"
               fill="#ffd700"
               filter="url(#goldGlowSoft)">
        <animate attributeName="opacity" values="0.65;1;0.65" dur="2.8s" repeatCount="indefinite"/>
      </polygon>

      <!-- ============================================================
           ARROW 2 — Right side descending (book → circular arrows)
           From ≈ (540,188) curves right & down to ≈ (530,365)
      ============================================================ -->

      <!-- Glow halo -->
      <path d="M 540,190  Q 565,280  535,365"
            fill="none"
            stroke="#ffaa00"
            stroke-width="10"
            stroke-linecap="round"
            opacity="0.25"
            filter="url(#goldGlowHard)">
        <animate attributeName="opacity" values="0.15;0.45;0.15" dur="2.8s" repeatCount="indefinite" begin="0.9s"/>
      </path>
      <!-- Main arrow shaft -->
      <path d="M 540,190  Q 565,280  535,365"
            fill="none"
            stroke="url(#rotGold)"
            stroke-width="5"
            stroke-linecap="round"
            filter="url(#goldGlowSoft)">
        <animate attributeName="opacity" values="0.65;1;0.65" dur="2.8s" repeatCount="indefinite" begin="0.9s"/>
        <animate attributeName="stroke-width" values="4;6.5;4" dur="2.8s" repeatCount="indefinite" begin="0.9s"/>
      </path>
      <!-- Arrowhead 2 -->
      <polygon points="520,365  542,385  552,360"
               fill="#ffd700"
               filter="url(#goldGlowSoft)">
        <animate attributeName="opacity" values="0.65;1;0.65" dur="2.8s" repeatCount="indefinite" begin="0.9s"/>
      </polygon>

      <!-- ============================================================
           ARROW 3 — Bottom curve (circular arrows → lightbulb)
           From ≈ (488,462) curves down-left to ≈ (285,462)
      ============================================================ -->

      <!-- Glow halo -->
      <path d="M 490,462  Q 400,508  282,462"
            fill="none"
            stroke="#ffaa00"
            stroke-width="10"
            stroke-linecap="round"
            opacity="0.25"
            filter="url(#goldGlowHard)">
        <animate attributeName="opacity" values="0.15;0.45;0.15" dur="2.8s" repeatCount="indefinite" begin="1.8s"/>
      </path>
      <!-- Main arrow shaft -->
      <path d="M 490,462  Q 400,508  282,462"
            fill="none"
            stroke="url(#rotGold)"
            stroke-width="5"
            stroke-linecap="round"
            filter="url(#goldGlowSoft)">
        <animate attributeName="opacity" values="0.65;1;0.65" dur="2.8s" repeatCount="indefinite" begin="1.8s"/>
        <animate attributeName="stroke-width" values="4;6.5;4" dur="2.8s" repeatCount="indefinite" begin="1.8s"/>
      </path>
      <!-- Arrowhead 3 -->
      <polygon points="287,447  270,468  298,477"
               fill="#ffd700"
               filter="url(#goldGlowSoft)">
        <animate attributeName="opacity" values="0.65;1;0.65" dur="2.8s" repeatCount="indefinite" begin="1.8s"/>
      </polygon>

      <!-- ============================================================
           OPTIONAL: subtle overall warm-gold ambient pulse
           so the whole graphic feels alive
      ============================================================ -->
      <circle cx="315" cy="315" r="308"
              fill="none"
              stroke="#7a5500"
              stroke-width="1.5"
              opacity="0.25">
        <animate attributeName="opacity" values="0.1;0.35;0.1" dur="5s" repeatCount="indefinite"/>
      </circle>

    </svg>
  </div>
</div>

</body>
</html>
